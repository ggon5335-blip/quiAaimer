<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔒 Admin — QuiAaimé</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--p:#7c3aed;--p2:#a855f7;--pk:#ec4899;--cy:#06b6d4;--bg:#050510;--ok:#22c55e;--no:#ef4444;--f:'Outfit',sans-serif}
body{font-family:var(--f);background:var(--bg);color:#f1f1f1;min-height:100vh;overflow-x:hidden}

/* ANIMATED BG */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(124,58,237,.08),transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(236,72,153,.06),transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(6,182,212,.05),transparent 50%);z-index:0;animation:bgShift 12s ease-in-out infinite}
@keyframes bgShift{0%,100%{opacity:.6}50%{opacity:1}}

/* GRID OVERLAY */
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:50px 50px;z-index:0;pointer-events:none}

.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:20px 16px}

/* HEADER */
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding:18px 22px;background:linear-gradient(145deg,rgba(124,58,237,.08),rgba(236,72,153,.04));border:1px solid rgba(124,58,237,.15);border-radius:18px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,.5),rgba(236,72,153,.5),transparent)}
.hdr-icon{font-size:2.2rem;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.hdr h1{font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,#fff,var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:.7rem;color:rgba(255,255,255,.35)}
.hdr-live{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:.75rem;font-weight:700;color:var(--ok)}
.hdr-live::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--ok);animation:livePulse 1.5s ease-in-out infinite}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}50%{box-shadow:0 0 0 8px rgba(34,197,94,0)}}
.hdr-back{position:absolute;top:10px;right:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);padding:6px 12px;border-radius:8px;font:600 .65rem var(--f);cursor:pointer;text-decoration:none;transition:all .2s}
.hdr-back:hover{color:#fff;background:rgba(255,255,255,.1)}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;text-align:center;position:relative;overflow:hidden;transition:all .3s;animation:cardIn .4s ease-out backwards}
.stat:nth-child(1){animation-delay:.05s}.stat:nth-child(2){animation-delay:.1s}.stat:nth-child(3){animation-delay:.15s}.stat:nth-child(4){animation-delay:.2s}.stat:nth-child(5){animation-delay:.25s}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.stat:hover{transform:translateY(-3px);border-color:rgba(124,58,237,.2);box-shadow:0 8px 30px rgba(124,58,237,.1)}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px}
.stat:nth-child(1)::before{background:linear-gradient(90deg,var(--p),var(--pk))}
.stat:nth-child(2)::before{background:linear-gradient(90deg,var(--cy),var(--ok))}
.stat:nth-child(3)::before{background:linear-gradient(90deg,#f59e0b,var(--no))}
.stat:nth-child(4)::before{background:linear-gradient(90deg,var(--pk),var(--p2))}
.stat:nth-child(5)::before{background:linear-gradient(90deg,var(--ok),var(--cy))}
.stat-icon{font-size:1.5rem;margin-bottom:4px}
.stat-val{font-size:2rem;font-weight:900;background:linear-gradient(135deg,#fff,var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-lbl{font-size:.6rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-top:2px}

/* SECTIONS */
.section{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:16px;margin-bottom:16px;overflow:hidden;animation:cardIn .5s ease-out backwards}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer}
.sec-hdr:hover{background:rgba(255,255,255,.02)}
.sec-icon{font-size:1.2rem}.sec-title{font-size:.85rem;font-weight:800;flex:1}.sec-count{font-size:.7rem;font-weight:700;color:var(--cy);background:rgba(6,182,212,.1);padding:3px 10px;border-radius:12px}
.sec-body{padding:0;max-height:500px;overflow-y:auto}

/* ONLINE LIST */
.online-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .2s;animation:rowIn .3s ease-out backwards}
.online-item:hover{background:rgba(255,255,255,.02)}
@keyframes rowIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.ol-pulse{width:10px;height:10px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);animation:livePulse 2s ease-in-out infinite;flex-shrink:0}
.ol-info{flex:1;min-width:0}
.ol-ip{font-size:.8rem;font-weight:700;font-family:'Courier New',monospace;color:var(--cy)}
.ol-device{font-size:.65rem;color:rgba(255,255,255,.35);display:flex;gap:8px;margin-top:2px}
.ol-device span{background:rgba(255,255,255,.05);padding:1px 6px;border-radius:4px}
.ol-time{font-size:.6rem;color:rgba(255,255,255,.2);text-align:right;white-space:nowrap}

/* VISITOR TABLE */
.vis-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .2s;animation:rowIn .3s ease-out backwards}
.vis-item:hover{background:rgba(255,255,255,.02)}
.vis-rank{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pk));display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;flex-shrink:0}
.vis-info{flex:1;min-width:0}
.vis-ip{font-size:.8rem;font-weight:700;font-family:'Courier New',monospace}
.vis-meta{font-size:.6rem;color:rgba(255,255,255,.3);display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.vis-meta span{background:rgba(255,255,255,.04);padding:1px 6px;border-radius:4px}
.vis-stats{text-align:right}
.vis-views{font-size:.85rem;font-weight:800;color:var(--pk)}
.vis-date{font-size:.55rem;color:rgba(255,255,255,.2)}

/* CHART BAR */
.chart{padding:18px;display:flex;align-items:flex-end;gap:8px;height:120px}
.bar{flex:1;border-radius:6px 6px 0 0;min-height:4px;position:relative;transition:height .6s cubic-bezier(.34,1.56,.64,1);cursor:pointer}
.bar:hover{filter:brightness(1.3)}
.bar-mobile{background:linear-gradient(180deg,var(--pk),rgba(236,72,153,.3))}
.bar-pc{background:linear-gradient(180deg,var(--cy),rgba(6,182,212,.3))}
.bar-lbl{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:.6rem;font-weight:800;white-space:nowrap}
.chart-legend{display:flex;gap:16px;justify-content:center;padding:0 18px 14px}
.legend{display:flex;align-items:center;gap:5px;font-size:.65rem;color:rgba(255,255,255,.4);font-weight:600}
.legend-dot{width:8px;height:8px;border-radius:50%}
.legend-dot.mob{background:var(--pk)}.legend-dot.pc{background:var(--cy)}

/* EMPTY STATE */
.empty{text-align:center;padding:30px;color:rgba(255,255,255,.2);font-size:.8rem}
.empty-icon{font-size:2rem;margin-bottom:6px}

/* REFRESH */
.refresh-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;font-size:.65rem;color:rgba(255,255,255,.2)}
.refresh-dot{width:5px;height:5px;border-radius:50%;background:var(--ok);animation:livePulse 2s ease-in-out infinite}

@media(max-width:500px){.stats{grid-template-columns:repeat(2,1fr)}.stat-val{font-size:1.5rem}.hdr h1{font-size:1.1rem}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-icon">🛡️</div>
    <div><h1>Admin Panel</h1><p>QuiAaimé — Dashboard Privé</p></div>
    <div class="hdr-live">LIVE</div>
    <a href="/" class="hdr-back">← Retour au jeu</a>
  </div>

  <div class="stats" id="stats">
    <div class="stat"><div class="stat-icon">👥</div><div class="stat-val" id="s-unique">-</div><div class="stat-lbl">Visiteurs</div></div>
    <div class="stat"><div class="stat-icon">👁️</div><div class="stat-val" id="s-views">-</div><div class="stat-lbl">Vues totales</div></div>
    <div class="stat"><div class="stat-icon">🟢</div><div class="stat-val" id="s-online">-</div><div class="stat-lbl">En ligne</div></div>
    <div class="stat"><div class="stat-icon">📱</div><div class="stat-val" id="s-mobile">-</div><div class="stat-lbl">Mobile</div></div>
    <div class="stat"><div class="stat-icon">🎮</div><div class="stat-val" id="s-rooms">-</div><div class="stat-lbl">Rooms</div></div>
  </div>

  <div class="section" style="animation-delay:.3s">
    <div class="sec-hdr"><span class="sec-icon">📊</span><span class="sec-title">Répartition Appareils</span></div>
    <div class="chart" id="chart"></div>
    <div class="chart-legend"><div class="legend"><div class="legend-dot mob"></div>Mobile</div><div class="legend"><div class="legend-dot pc"></div>PC</div></div>
  </div>

  <div class="section" style="animation-delay:.35s">
    <div class="sec-hdr"><span class="sec-icon">🟢</span><span class="sec-title">En ligne maintenant</span><span class="sec-count" id="online-count">0</span></div>
    <div class="sec-body" id="online-list"><div class="empty"><div class="empty-icon">😴</div>Personne en ligne</div></div>
  </div>

  <div class="section" style="animation-delay:.4s">
    <div class="sec-hdr"><span class="sec-icon">📋</span><span class="sec-title">Historique des visiteurs</span><span class="sec-count" id="vis-count">0</span></div>
    <div class="sec-body" id="vis-list"><div class="empty"><div class="empty-icon">📭</div>Aucun visiteur</div></div>
  </div>

  <div class="refresh-bar"><div class="refresh-dot"></div>Actualisation auto toutes les 5s</div>
</div>

<script>
const KEY=new URLSearchParams(location.search).get('key');
function load(){
  fetch('/api/admin/data?key='+KEY).then(r=>r.json()).then(d=>{
    if(d.error)return document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:3rem">🚫</div>';
    document.getElementById('s-unique').textContent=d.uniqueCount;
    document.getElementById('s-views').textContent=d.totalViews;
    document.getElementById('s-online').textContent=d.online.length;
    document.getElementById('s-mobile').textContent=d.mobileCount;
    document.getElementById('s-rooms').textContent=d.rooms;
    document.getElementById('online-count').textContent=d.online.length;
    document.getElementById('vis-count').textContent=d.visitors.length;
    // Online
    const ol=document.getElementById('online-list');
    if(!d.online.length){ol.innerHTML='<div class="empty"><div class="empty-icon">😴</div>Personne en ligne</div>'}
    else{ol.innerHTML='';d.online.forEach((u,i)=>{const el=document.createElement('div');el.className='online-item';el.style.animationDelay=`${i*.05}s`;el.innerHTML=`<div class="ol-pulse"></div><div class="ol-info"><div class="ol-ip">${u.ip}</div><div class="ol-device"><span>${u.device.type}</span><span>${u.device.os}</span><span>${u.device.browser}</span></div></div><div class="ol-time">${timeAgo(u.connectedAt)}</div>`;ol.appendChild(el)})}
    // Visitors
    const vl=document.getElementById('vis-list');
    if(!d.visitors.length){vl.innerHTML='<div class="empty"><div class="empty-icon">📭</div>Aucun visiteur</div>'}
    else{vl.innerHTML='';d.visitors.sort((a,b)=>new Date(b.lastSeen)-new Date(a.lastSeen)).forEach((v,i)=>{const el=document.createElement('div');el.className='vis-item';el.style.animationDelay=`${i*.03}s`;el.innerHTML=`<div class="vis-rank">${i+1}</div><div class="vis-info"><div class="vis-ip">${v.ip}</div><div class="vis-meta"><span>${v.device.type}</span><span>${v.device.os}</span><span>${v.device.browser}</span></div></div><div class="vis-stats"><div class="vis-views">${v.visits} vue${v.visits>1?'s':''}</div><div class="vis-date">${timeAgo(v.lastSeen)}</div></div>`;vl.appendChild(el)})}
    // Chart
    const ch=document.getElementById('chart');
    const total=d.mobileCount+d.pcCount||1;
    const mp=Math.round(d.mobileCount/total*100),pp=Math.round(d.pcCount/total*100);
    ch.innerHTML=`<div class="bar bar-mobile" style="height:${Math.max(mp,5)}%"><div class="bar-lbl">${mp}%</div></div><div class="bar bar-pc" style="height:${Math.max(pp,5)}%"><div class="bar-lbl">${pp}%</div></div>`;
  }).catch(()=>{});
}
function timeAgo(d){const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'à l\'instant';if(s<3600)return Math.floor(s/60)+'min';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'j'}
load();setInterval(load,5000);
</script>
</body>
</html>
